<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js"></script>
<title>農工大???部</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:#0a6b37;
overflow:hidden;
}

/* 背景 */
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.3);
pointer-events:none;
}

/* 🎁 */
#gift{
cursor:pointer;
animation: float 2s infinite;
z-index:10;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

will-change: transform;
gap:5px;
}
/*紙吹雪ブロック*/
#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:5;
}
  
.tap{
font-size:2em;
color:white;
letter-spacing:2px;
margin:0;
}

.gift-emoji{
 width: 150px;   /* 好きな幅に調整 */
  height: auto;   /* 縦横比を維持 */
}

#gift:active{
transform: scale(0.9);
}

@keyframes float {
0% { transform: translateY(0); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0); }
}

/* 中央 */
.box-wrapper{
position:absolute;
top:50%;
left:50%;
transform: translate(-50%, -50%);
}

/* ボックス */
.box{
background:white;
width:90vw;
max-width:700px;
padding:40px;
box-sizing:border-box;

border:12px solid #8b5a2b;
box-shadow:
0 0 0 4px #d2b48c inset,
0 10px 30px rgba(0,0,0,0.3);

transform:scale(0.5);
opacity:0;
pointer-events:none;

will-change: transform, opacity;
}

.box.active{
animation: pop 0.6s ease-out forwards;
pointer-events:auto;
}

@keyframes pop {
0% { transform: scale(0.5); opacity:0; }
70% { transform: scale(1.1); opacity:1; }
100% { transform: scale(1); opacity:1; }
}

.box-wrapper.shake{
animation: shake 0.4s ease-in-out;
}

@keyframes shake {
0% { transform: translate(-50%, -50%) translate(0,0); }
20% { transform: translate(-50%, -50%) translate(-4px,2px); }
40% { transform: translate(-50%, -50%) translate(4px,-2px); }
60% { transform: translate(-50%, -50%) translate(-3px,1px); }
80% { transform: translate(-50%, -50%) translate(3px,-1px); }
100% { transform: translate(-50%, -50%) translate(0,0); }
}

/* テキスト */
h1{
font-size:2.5em;
text-align:center;
margin-bottom:20px;
color:#c0392b;
}

p{
font-size:1.3em;
text-align:center;
line-height:1.7;
}

.small{
font-size:0.7em;
color:gray;
}
  
img.emoji{
width:1em;
height:1em;
vertical-align:-0.1em;
vertical-align:middle;
}
  
</style>
</head>

<body>

<canvas id="confetti"></canvas> 
  
<div id="gift">
  <span class="tap"><strong>TAP ME</strong></span>
<img class="gift-emoji" src="gift.png" alt="🎁">
</div>

<div class="box-wrapper">
  <div class="box">

    <h1>おめでとう！</h1>

    <p>
    あなたは農工大の<br>
    <strong><span style="color:#c0392b;">美術部</span></strong>を見つけました！<br>
    <a href="https://x.com/nokonokoart" target="_blank">ツイッター（現X）</a><br>
    <a href="https://www.instagram.com/artclub_tuat/" target="_blank">インスタグラム</a>も<br>
    チェックしてください！
    </p>

    <p class="small">
    ※ ネタバラシはこっそりおねがいします🤫
    </p>

  </div>
</div>

<audio id="se" src="sound.mp3" preload="auto"></audio>

<script>
let opened = false;

document.getElementById("gift").addEventListener("click", function(){

  if(opened) return;
  opened = true;

  this.style.display = "none";

  const box = document.querySelector(".box");
  const wrapper = document.querySelector(".box-wrapper");

  setTimeout(()=>{
    box.classList.add("active");

    if(window.twemoji){
      twemoji.parse(box);
    }
    explodeConfetti();   // 紙吹雪爆発
    updateConfetti();    // 紙吹雪アップデート
  }, 100);

  setTimeout(()=>{
    wrapper.classList.add("shake");
  }, 600);

  const audio = document.getElementById("se");
  if(audio){
    audio.currentTime = 0;
    audio.volume = 0.6;
    audio.play().catch(()=>{});
  }

  if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
  }

});

/* 初期Twemoji */
if(window.twemoji){
  twemoji.parse(document.body);
}

/* 爆発 */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function explodeConfetti(){
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  for(let i=0;i<150;i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 3;

    particles.push({
      x: centerX,
      y: centerY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random()*6+4,
      color: `hsl(${Math.random()*360},100%,60%)`,
      life: 150
    });
  }
  requestAnimationFrame(updateConfetti);
}

function updateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;

    // 重力
    p.vy += 0.1;

    // 空気抵抗
    p.vx *= 0.99;
    p.vy *= 0.99;

    p.life--;

    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);

    if(p.life <= 0){
      particles.splice(i,1);
    }
  }

  if(particles.length > 0){
    requestAnimationFrame(updateConfetti);
  }
}
</script>

</body>
</html>
